<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电梯智能监控云平台</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: white; padding: 20px; }
        .card { background: #2d2d30; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .data-text { font-size: 24px; color: #4CAF50; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007acc; color: white; border: none; border-radius: 5px; }
        button:hover { background: #005999; }
    </style>
</head>
<body>

    <h1>🚀 Elevator Smart Dashboard</h1>
    
    <div class="card">
        <h3>实时监控画面 (WebRTC 极低延迟)</h3>
        <iframe src="http://192.168.100.10:8889/live" width="640" height="480" frameborder="0" scrolling="no" allowfullscreen></iframe>
    </div>

    <div class="card">
        <h3>实时环境数据 (MQTT over WS)</h3>
        <p>设备连接：<span id="device_conn_val" class="data-text" style="color: gray;">等待连接... ⚪</span></p>
        <hr style="border-color: #444;">
        
        <p>当前楼层：<span id="floor_val" class="data-text">--</span> F</p>
        <p>轿厢温度：<span id="temp_val" class="data-text">--</span> °C</p>
        <p>系统状态：<span id="status_val" class="data-text">--</span></p>
        <p>媒体状态：<span id="media_status_val" class="data-text" style="font-size: 18px;">--</span></p>
    </div>

    <div class="card">
        <h3>远程云端控制 (交互)</h3>
        <button onclick="sendAlertCommand()" style="background: #e74c3c;">🚨 触发远程警报</button>
        <button onclick="sendCancelCommand()" style="background: #2ecc71;">✅ 解除警报</button>
        <hr style="border-color: #444;">
        
        <input type="file" id="ad_file_input" accept="video/mp4" style="display: none;" onchange="uploadAndSendAd()">
        
        <button onclick="document.getElementById('ad_file_input').click()" style="background: #3498db;">📺 选择并自动投放广告</button>
        <button onclick="stopAd()" style="background: #e74c3c;">🛑 停止广告播放</button>
        <hr style="border-color: #444;">
        <button onclick="startCamera()" style="background: #9b59b6;">🎥 启动摄像头推流</button>
        <button onclick="stopCamera()" style="background: #7f8c8d;">⏹ 停止摄像头推流</button>
    </div>

    <script>
        // 1. 连接到 EMQX 的 WebSocket 端口 (8083)
        // 优先使用页面所在主机；如果是直接双击打开本地 HTML，则回退到云端服务器地址。
        const brokerHost = window.location.hostname || '192.168.100.10';
        const client = mqtt.connect(`ws://${brokerHost}:8083/mqtt`, {
            reconnectPeriod: 1000
        });

        const TOPIC_TELEMETRY = "elevator/001/telemetry";
        const TOPIC_COMMAND = "elevator/001/command";
        const TOPIC_STATE = "elevator/001/state";
        const TOPIC_MEDIA = "elevator/001/media";

        client.on('connect', function () {
            console.log("成功连接到 EMQX WebSocket!");
            // 连接成功后订阅传感器数据主题
            client.subscribe(TOPIC_TELEMETRY);
            client.subscribe(TOPIC_STATE);
            client.subscribe(TOPIC_MEDIA);
        });

        client.on('reconnect', function () {
            console.log("MQTT WebSocket 重连中...");
        });

        client.on('error', function (error) {
            console.error("MQTT WebSocket 出错:", error);
        });

        // 2. 接收并解析数据，刷新网页 UI
        client.on('message', function (topic, message) {
            let data;
            try {
                data = JSON.parse(message.toString());
            } catch (error) {
                console.error("收到无法解析的 MQTT 消息:", topic, message.toString(), error);
                return;
            }

            if (topic === TOPIC_TELEMETRY) {
                const floor = data.floor;
                const temperature = data.temperature ?? data.temperature_avg;
                const status = data.status ?? "unknown";

                if (floor !== undefined) {
                    document.getElementById("floor_val").innerText = floor;
                }

                if (typeof temperature === "number") {
                    document.getElementById("temp_val").innerText = temperature.toFixed(1);
                } else if (temperature !== undefined) {
                    const numericTemperature = Number(temperature);
                    document.getElementById("temp_val").innerText =
                        Number.isFinite(numericTemperature) ? numericTemperature.toFixed(1) : "--";
                }

                document.getElementById("status_val").innerText = status;
                
                if (status !== "normal") {
                    document.getElementById("status_val").style.color = "red";
                } else {
                    document.getElementById("status_val").style.color = "#4CAF50";
                }
            } else if (topic === TOPIC_STATE) {
                const connSpan = document.getElementById("device_conn_val");
                if (data.state === "online") {
                    connSpan.innerText = "在线 🟢";
                    connSpan.style.color = "#4CAF50";
                } else {
                    connSpan.innerText = "离线 🔴";
                    connSpan.style.color = "red";
                    document.getElementById("floor_val").innerText = "--";
                    document.getElementById("temp_val").innerText = "--";
                    document.getElementById("status_val").innerText = "已断开";
                    document.getElementById("status_val").style.color = "gray";
                }
            } else if (topic === TOPIC_MEDIA) {
                const mediaStatus = `${data.component || "unknown"} / ${data.state || "unknown"}`;
                const reason = data.reason ? ` (${data.reason})` : "";
                const currentFile = data.current_file ? ` - ${data.current_file}` : "";
                const statusLine = `${mediaStatus}${currentFile}${reason}`;
                const mediaNode = document.getElementById("media_status_val");
                mediaNode.innerText = statusLine;
                mediaNode.style.color = data.state === "failed" ? "#e74c3c" : "#4CAF50";
            }
        });

        // 3. 按钮交互：下发控制指令
        function sendAlertCommand() {
            const payload = JSON.stringify({ action: "sound_alarm", level: "high" });
            client.publish(TOPIC_COMMAND, payload);
            console.log("警报指令已发送上云！");
        }
        function sendCancelCommand() {
            const payload = JSON.stringify({ action: "cancel_alarm" });
            client.publish(TOPIC_COMMAND, payload);
            console.log("解除警报指令已发送！");
        }

        //先上传到 Cloud Server，拿到 URL 后再通过 MQTT 发给开发板
        async function uploadAndSendAd() {
            const fileInput = document.getElementById('ad_file_input');
            const file = fileInput.files[0];
            
            if (!file) return; // 如果没选文件直接退出

            console.log("正在上传视频到云端服务器: " + file.name + " ...");
            const formData = new FormData();
            formData.append('video', file);

            try {
                // 1. 上传给刚才跑起来的 Flask 服务器
                const response = await fetch('http://192.168.100.10:5000/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.url) {
                    console.log("✅ 上传成功！获得下载链接:", data.url);
                    
                    // 2. 将拿到的 URL 通过 MQTT 发送给开发板
                    const payload = JSON.stringify({ action: "switch_ad", url: data.url });
                    client.publish(TOPIC_COMMAND, payload);
                    console.log("🚀 广告更新 MQTT 指令已发送上云！");
                }
            } catch (error) {
                console.error("❌ 上传失败:", error);
                alert("上传失败，请检查 Cloud Server 是否运行。");
            } finally {
                // 清空选择框。这样你下次还能重新选择同一个测试视频！
                fileInput.value = '';
            }
        }
	    function stopAd() {
        	const payload = JSON.stringify({ action: "stop_ad" });
        	client.publish(TOPIC_COMMAND, payload);
       	 	console.log("停止广告指令已发送！");
    	}
        function startCamera() {
            const payload = JSON.stringify({ action: "start_camera" });
            client.publish(TOPIC_COMMAND, payload);
            console.log("启动摄像头推流指令已发送！");
        }
        function stopCamera() {
            const payload = JSON.stringify({ action: "stop_camera" });
            client.publish(TOPIC_COMMAND, payload);
            console.log("停止摄像头推流指令已发送！");
        }
    </script>
</body>
</html>
